apiVersion: 1

providers:
  - name: 'home-energy-tracker'
    orgId: 1
    folder: 'Home Energy Tracker'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboard
      foldersFromFilesStructure: false

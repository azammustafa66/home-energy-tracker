spring.application.name=ingestion-service
server.port=8083
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=energyUsageEvent:com.demo.common.kafka.event.EnergyUsageEvent

simulation.mode=none
simulation.threads=10
simulation.interval-ms=100
simulation.requests-per-interval=100
simulation.seed-file=scripts/seed-output.json
simulation.ingestion-url=http://localhost:8083/api/v1/ingestion
simulation.max-energy-consumed=50.0

# Simulator client-credentials auth (machine identity for sensor traffic)
simulation.auth.token-uri=http://localhost:8080/realms/home-energy-tracker-security-realm/protocol/openid-connect/token
simulation.auth.client-id=energy-sensors
simulation.auth.client-secret=${ENERGY_SENSORS_CLIENT_SECRET}

# Keycloak / OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/home-energy-tracker-security-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/home-energy-tracker-security-realm/protocol/openid-connect/certs
# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus

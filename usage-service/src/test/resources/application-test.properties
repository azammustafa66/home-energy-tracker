spring.application.name=usage-service
server.port=0

# Kafka - consumer
spring.kafka.consumer.group-id=usage-service-it
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:com.leetjourney.kafka.event.EnergyUsageEvent
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka - producer
spring.kafka.template.default-topic=energy-alerts
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Influx defaults overridden by DynamicPropertySource in tests
influx.url=http://localhost:8086
influx.token=my-token
influx.org=leetjourney
influx.bucket=usage-bucket

device.service.url=http://localhost:0/api/v1/device
user.service.url=http://localhost:0/api/v1/user

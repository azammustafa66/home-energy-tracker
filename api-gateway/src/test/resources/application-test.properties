spring.application.name=api-gateway
server.port=0

# Stub values - real security/JwtDecoder are replaced via TestSecurityConfig.
keycloak.auth.jwk-set-uri=http://localhost:0/jwks
security.excluded.urls=/actuator/**,/swagger-ui/**,/docs/**,/v3/api-docs/**

# Tighter resilience4j so the breaker trips quickly in tests
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=4
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=2
resilience4j.circuitbreaker.configs.default.failureRateThreshold=10
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=2s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2

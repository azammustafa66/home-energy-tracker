spring.application.name=device-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/device_service
spring.datasource.username=device_service
spring.datasource.password=${SERVICE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.grpc.server.port=9092

# Keycloak / OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/home-energy-tracker-security-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/home-energy-tracker-security-realm/protocol/openid-connect/certs

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
